name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  gate:
    name: Gate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Detect stub skills
        run: npm run detect:skill-stubs

      - name: Validate schemas and registries
        run: npm run validate

      - name: Run tests
        run: npm test

      - name: Evaluate routing
        run: node packages/yes-cli/index.js eval route

      - name: Evaluate boot token cost
        run: npm run eval:cost

      - name: Doctor
        run: npm run doctor

      - name: Build all host bundles
        run: node packages/yes-cli/index.js build all

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_COMMENTS: false
        with:
          config-path: .gitleaks.toml
